<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link
      rel="preconnect"
      href="https://rsms.me/"

    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; overscroll-behavior: none; }
      body { background: #0b1020; color: #e6ecff; font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; user-select: none; }
      /* Prevent text-selection / context menus in kiosk mode */
      * { -webkit-user-select: none; user-select: none; }
      input, textarea, [contenteditable] { -webkit-user-select: text; user-select: text; }
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 8px; }
      ::-webkit-scrollbar-track { background: transparent; }
    </style>
